version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lojistik_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lojistik_db
      POSTGRES_USER: lojistik_admin
      POSTGRES_PASSWORD: lojistik_sifre_2024
    volumes:
      - postgres_veri:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lojistik_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_veri:
